<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Contact Dry Oar WhiteWater Rafting for inquiries, reservations, or suggestions.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/contact.css" type="text/css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>Contact Us - Dry Oar WhiteWater Rafting</title>
</head>

<body>

  <header>
    <img src="images/dryoar.png" alt="Rafting Company Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="company-info">
      <h2>Company Information</h2>
      <p>Address: 123 Rafting Way, River City, RA 45678</p>
      <p>Phone: 123-456-7890</p>
      <p>Email: info@dryoar.com</p>
      <!-- Embedded Google Map -->
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d250989.2496091546!2d-122.45799617427426!3d37.79885357345274!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808f7e57f82e0df5%3A0x1183d43aeeb83b6d!2sSan%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1644306708888!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <section class="employee-profiles">
      <h2>Meet Our Team</h2>
      <div class="employee">
        <img src="images/employee1.jpg" alt="Employee 1">
        <figcaption>Enock Ncube -Park Manger </figcaption>
      </div>
      <div class="employee">
        <img src="images/employee2.jpg" alt="Employee 2">
        <figcaption>Godfrey bomba - Rafting Guide</figcaption>
      </div>
      <div class="employee">
        <img src="images/employee3.jpg" alt="Employee 3">
        <figcaption>Maud Ncube - Trip Coordinator</figcaption>
      </div>
    </section>

    <section class="contact-form">
      <h2>Contact Us</h2>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="purpose">Purpose:</label>
        <select id="purpose" name="purpose" required>
          <option value="general">General Inquiry</option>
          <option value="reservation">Reservation Question</option>
          <option value="suggestion">Website Suggestion</option>
        </select><br><br>
        
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" required></textarea><br><br>
        
        <input type="checkbox" id="subscribe" name="subscribe">
        <label for="subscribe">Please subscribe me to the monthly newsletter</label><br><br>
        
        <input type="submit" value="Submit">
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Rafting Company. Created by Tumisang Msiza</p>
    <nav class="sociallinks">
      <a href="https://facebook.com">
        <img src="images/facebook.png" alt="Facebook">
      </a>
      <a href="https://twitter.com">
        <img src="images/twitter.png" alt="Twitter">
      </a>
      <a href="https://instagram.com">
        <img src="images/instagram.png" alt="Instagram">
      </a>
    </nav>
  </footer>

</body>

</html>
